<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta author="Antonio Jesús Reyes Vera">
    <meta content="seo, camisetas, ropa, chandal, algodon, calidad, precio, barato, barata">

    <link rel="website icon" type="png" href="./img/camiseta.png"> <!-- cambiar icono web -->
    <link rel="stylesheet" href="../css/login.css">
    <title>Iniciar Sesion</title>
</head>
<body class="bodyLogin">

    
    <div class="container">
        <form class="email-form">
            <h2>Regístrate</h2>
            <label for="to">Nombre de usuario</label>
            <input type="email" id="to" name="to" required>

            <label for="subject">Contraseña</label>
            <input type="text" id="subject" name="subject" required>

            <label for="message">Danos tú opinión</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Entrar</button>
        </form>
    </div>

  



</body>
