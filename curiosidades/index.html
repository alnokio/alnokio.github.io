<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .card {
            width: 400px;
            aspect-ratio: 1 / 0.7;
            position: relative;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .card .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5 ease-in-out;
        }
        
        .card ::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 2px solid white;
            border-radius: inherit;
            opacity: 0;
            transition: 0.4 ease-in-out;
        }

        .card:hover img {
            filter: grayscale(1) brightness(0.4);
        }

        .card:hover::after {
            opacity: 1;
            inset: 20px;
        }

        .card:hover .content h2 {
            scale: 1;
            opacity: 1;
        }

        .card:hover .content p {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="image-box">
            <img src="unnamed.jpg">
        </div>
        <div class="content">
            <h2>Fernando Alonso</h2>
            <p>Renault R25 V10 2005</p>
        </div>
    </div>
    
</body>
</html>
