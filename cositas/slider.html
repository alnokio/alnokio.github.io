<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.slider {
    width: 80%;
    max-width: 800px;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.slides {
    display: flex;
    width: 400%;
    animation: slideAnimation 16s infinite;
}

.slide {
    width: 100%;
    flex-shrink: 0;
}

.slide img {
    width: 100%;
    height: auto;
    display: block;
}

/* Animation for the slider */
@keyframes slideAnimation {
    0% {
        transform: translateX(0);
    }
    25% {
        transform: translateX(-100%);
    }
    50% {
        transform: translateX(-200%);
    }
    75% {
        transform: translateX(-300%);
    }
    100% {
        transform: translateX(0);
    }
}

    </style>
</head>
<body>
    <div class="slider">
        <div class="slides">
            <!-- Each slide -->
            <div class="slide"><img src="../img/borroso3.jpg" alt="Dish 1"></div>
            <div class="slide"><img src="../img/camiseta.png" alt="Dish 2"></div>
            <div class="slide"><img src="../img/fondito.jpg" alt="Dish 3"></div>
            <div class="slide"><img src="../img/fondo.webp" alt="Dish 4"></div>
        </div>
    </div>
</body>
</html>
