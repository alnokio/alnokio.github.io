<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Medac</title>
    <link rel="shortcut icon" href="img/dorado.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            gap: 1rem; /* Espaciado entre secciones */
            padding: 1rem;
        }

        section {
            flex: 1;
            min-width: 250px;
            max-width: 30%;
            height: auto;
            padding: 1rem;
            border-radius: 8px;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .salas {
            background-color: red;
        }
        
        .asientos {
            background-color: blue;
        }
        
        .info {
            background-color: green;
        }

        @media (max-width: 768px) {
            section {
                max-width: 100%; /* Cada sección ocupará toda la fila */
            }
        }

        footer {
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 0.5rem 0;
        }
    </style>
</head>
<body>

    <header class="bg-dark text-white text-center py-2">
        <h1>Cine Medac</h1>
    </header>

    <main>
        <!-- Sidebar de Salas -->
        <section class="salas">
            <h2>Salas</h2>
            <p>Información sobre las salas.</p>
        </section>

        <!-- Área de selección de asientos -->
        <section class="asientos">
            <h2>Asientos</h2>
            <p>Selecciona tus asientos aquí.</p>
        </section>

        <!-- Información de la película -->
        <section class="info">
            <h2>Película</h2>
            <p>Detalles de la película seleccionada.</p>
        </section>
    </main>

    <footer>
        &copy; 2024 Cine Medac. Todos los derechos reservados.
    </footer>

</body>
</html>
