<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover sobre imagen</title>
    <style>
        .contenedor {
            position: relative;
            width: 300px;
        }

        .imagen {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .info-hover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 8px;
        }

        .contenedor:hover .info-hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="img/camiseta.png" alt="Descripción de la imagen" class="imagen">
        <div class="info-hover">
            <p>PAPASITO</p>
        </div>
    </div>
</body>
</html>
